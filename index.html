<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Tracker</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #374151;
      --accent: #60a5fa;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #111827 100%);
      color: var(--text);
      padding: 20px;
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 28px;
      letter-spacing: 0.5px;
    }

    .legend {
      margin: 0 auto 16px;
      max-width: 1200px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(260px, 1fr));
      gap: 14px;
      align-items: start;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .column {
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      min-width: 260px;
    }

    .column-header {
      background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
      padding: 14px 12px;
      text-align: center;
      font-weight: 700;
      font-size: 18px;
      border-bottom: 1px solid var(--line);
    }

    .teams {
      padding: 8px;
    }

    .wdl-header,
    .team-row {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) 36px 36px 36px 54px;
      gap: 8px;
      align-items: center;
    }

    .wdl-header {
      padding: 6px 6px 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .wdl-header .spacer {
      grid-column: 1 / span 2;
    }

    .wdl-header .label {
      text-align: center;
    }

    .team-row {
      padding: 8px 6px;
      border-bottom: 1px solid rgba(55, 65, 81, 0.65);
    }

    .team-row:last-child {
      border-bottom: none;
    }

    .flag {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.25);
      display: block;
      background: #fff;
    }

    .team-name {
      font-size: 14px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .team-name.eliminated {
      color: var(--danger);
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    .count-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      width: 36px;
      height: 32px;
      cursor: pointer;
      font-weight: 700;
      padding: 0;
      font-size: 14px;
      user-select: none;
    }

    .count-btn:hover {
      border-color: var(--accent);
      color: #fff;
    }

    .elim-btn {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--danger);
      cursor: pointer;
      font-weight: 700;
      padding: 0 2px;
      white-space: nowrap;
      justify-self: start;
    }

    .elim-btn:hover {
      text-decoration: underline;
    }

    .totals {
      padding: 10px 12px 14px;
      border-top: 1px solid var(--line);
      background: rgba(31, 41, 55, 0.55);
    }

    .totals-title {
      font-weight: 700;
      margin-bottom: 8px;
      color: #f3f4f6;
    }

    .totals-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .total-box {
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
    }

    .total-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .total-value {
      display: block;
      width: 100%;
      border: 1px solid var(--line);
      background: #111827;
      color: var(--text);
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      padding: 6px 4px;
      min-height: 38px;
      line-height: 24px;
    }

    @media (max-width: 1400px) {
      .grid {
        grid-template-columns: repeat(3, minmax(260px, 1fr));
      }
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: repeat(1, minmax(260px, 1fr));
      }
    }
  </style>
</head>
<body>
  <h1>World Cup Team Tracker</h1>
  <div class="legend">
    Left-click a W, D, or L number to increase it. Right-click a number to decrease it. Click <strong>Elim.</strong> to toggle red strikethrough.
  </div>

  <div id="grid" class="grid"></div>

  <script>
    const STORAGE_KEY = "worldCupTeamTracker_v3";

    const columns = [
      {
        header: "Dad",
        teams: [
          ["Iran", 20],
          ["Ecuador", 24],
          ["Iraq", 57],
          ["Cape Verde", 67],
          ["Ivory Coast", 33],
          ["Haiti", 83],
          ["South Africa", 61],
          ["Croatia", 11],
        ],
      },
      {
        header: "Mom",
        teams: [
          ["Uzbekistan", 50],
          ["Algeria", 28],
          ["Scotland", 40],
          ["DR Congo", 46],
          ["Japan", 18],
          ["Uruguay", 17],
          ["Paraguay", 42],
          ["Turkey", 23],
        ],
      },
      {
        header: "Connor",
        teams: [
          ["Belgium", 9],
          ["Jordan", 64],
          ["Sweden", 38],
          ["Netherlands", 8],
          ["Curacao", 82],
          ["Bosnia", 63],
          ["Panama", 34],
          ["Egypt", 29],
        ],
      },
      {
        header: "Kole",
        teams: [
          ["Canada", 31],
          ["USA", 15],
          ["Czechia", 43],
          ["Morocco", 7],
          ["England", 4],
          ["Portugal", 5],
          ["Argentina", 1],
          ["Norway", 30],
        ],
      },
      {
        header: "Sahriya",
        teams: [
          ["Tunisia", 45],
          ["Spain", 2],
          ["South Korea", 22],
          ["Brazil", 6],
          ["Columbia", 14],
          ["Australia", 27],
          ["Germany", 10],
          ["Qatar", 56],
        ],
      },
      {
        header: "Ian",
        teams: [
          ["Senegal", 16],
          ["Austria", 25],
          ["Ghana", 73],
          ["New Zealand", 85],
          ["Mexico", 13],
          ["Saudi Arabia", 60],
          ["France", 3],
          ["Switzerland", 19],
        ],
      },
    ];

    const grid = document.getElementById("grid");

    function flagSrc(countryName) {
      return `flags/${encodeURIComponent(countryName)}.png`;
    }

    function defaultTeamState() {
      return { w: 0, d: 0, l: 0, eliminated: false };
    }

    function defaultColumnState(columnData) {
      const teams = {};
      columnData.teams.forEach(([teamName]) => {
        teams[teamName] = defaultTeamState();
      });
      return { teams };
    }

    function loadAllState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function saveAllState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    const storedState = loadAllState() || {};
    const appState = {};

    function ensureStateForColumn(columnData) {
      if (!storedState[columnData.header]) {
        storedState[columnData.header] = defaultColumnState(columnData);
      } else if (!storedState[columnData.header].teams) {
        storedState[columnData.header] = defaultColumnState(columnData);
      } else {
        columnData.teams.forEach(([teamName]) => {
          if (!storedState[columnData.header].teams[teamName]) {
            storedState[columnData.header].teams[teamName] = defaultTeamState();
          }
        });
      }
      appState[columnData.header] = storedState[columnData.header];
      return appState[columnData.header];
    }

    function getColumnTotals(columnState) {
      const totals = { wins: 0, draws: 0, losses: 0 };
      Object.values(columnState.teams).forEach(team => {
        totals.wins += Number(team.w || 0);
        totals.draws += Number(team.d || 0);
        totals.losses += Number(team.l || 0);
      });
      return totals;
    }

    function makeCountButton(text, onLeftClick, onRightClick) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "count-btn";
      btn.textContent = text;

      btn.addEventListener("click", (e) => {
        e.preventDefault();
        onLeftClick();
      });

      btn.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        onRightClick();
      });

      return btn;
    }

    function updateTotalDisplay(columnElement, columnState) {
      const totals = getColumnTotals(columnState);
      columnElement.querySelector('[data-total="wins"]').textContent = totals.wins;
      columnElement.querySelector('[data-total="draws"]').textContent = totals.draws;
      columnElement.querySelector('[data-total="losses"]').textContent = totals.losses;
    }

    function refreshTeamRow(row, teamState) {
      row.querySelector('[data-count="w"]').textContent = teamState.w;
      row.querySelector('[data-count="d"]').textContent = teamState.d;
      row.querySelector('[data-count="l"]').textContent = teamState.l;

      const teamNameEl = row.querySelector(".team-name");
      teamNameEl.classList.toggle("eliminated", Boolean(teamState.eliminated));
    }

    function makeTeamRow(teamName, rank, columnName, columnState, columnElement) {
      const teamState = columnState.teams[teamName];

      const row = document.createElement("div");
      row.className = "team-row";

      const flag = document.createElement("img");
      flag.className = "flag";
      flag.src = flagSrc(teamName);
      flag.alt = `${teamName} flag`;

      const name = document.createElement("div");
      name.className = "team-name";
      name.innerHTML = `${teamName} ${rank === "" ? "" : `<span class="rank">(${rank})</span>`}`;

      const wBtn = makeCountButton(
        String(teamState.w),
        () => {
          teamState.w += 1;
          saveAllState(storedState);
          refreshTeamRow(row, teamState);
          updateTotalDisplay(columnElement, columnState);
        },
        () => {
          teamState.w = Math.max(0, teamState.w - 1);
          saveAllState(storedState);
          refreshTeamRow(row, teamState);
          updateTotalDisplay(columnElement, columnState);
        }
      );
      wBtn.dataset.count = "w";
      wBtn.title = "Left-click to add W, right-click to subtract";

      const dBtn = makeCountButton(
        String(teamState.d),
        () => {
          teamState.d += 1;
          saveAllState(storedState);
          refreshTeamRow(row, teamState);
          updateTotalDisplay(columnElement, columnState);
        },
        () => {
          teamState.d = Math.max(0, teamState.d - 1);
          saveAllState(storedState);
          refreshTeamRow(row, teamState);
          updateTotalDisplay(columnElement, columnState);
        }
      );
      dBtn.dataset.count = "d";
      dBtn.title = "Left-click to add D, right-click to subtract";

      const lBtn = makeCountButton(
        String(teamState.l),
        () => {
          teamState.l += 1;
          saveAllState(storedState);
          refreshTeamRow(row, teamState);
          updateTotalDisplay(columnElement, columnState);
        },
        () => {
          teamState.l = Math.max(0, teamState.l - 1);
          saveAllState(storedState);
          refreshTeamRow(row, teamState);
          updateTotalDisplay(columnElement, columnState);
        }
      );
      lBtn.dataset.count = "l";
      lBtn.title = "Left-click to add L, right-click to subtract";

      const elimBtn = document.createElement("button");
      elimBtn.type = "button";
      elimBtn.className = "elim-btn";
      elimBtn.textContent = "Elim.";
      elimBtn.title = "Toggle elimination";

      elimBtn.addEventListener("click", () => {
        teamState.eliminated = !teamState.eliminated;
        saveAllState(storedState);
        refreshTeamRow(row, teamState);
      });

      row.appendChild(flag);
      row.appendChild(name);
      row.appendChild(wBtn);
      row.appendChild(dBtn);
      row.appendChild(lBtn);
      row.appendChild(elimBtn);

      refreshTeamRow(row, teamState);
      return row;
    }

    function makeColumn(columnData) {
      const columnState = ensureStateForColumn(columnData);

      const column = document.createElement("div");
      column.className = "column";

      const header = document.createElement("div");
      header.className = "column-header";
      header.textContent = columnData.header;

      const teamsWrap = document.createElement("div");
      teamsWrap.className = "teams";

      const wdlHeader = document.createElement("div");
      wdlHeader.className = "wdl-header";
      wdlHeader.innerHTML = `
        <div class="spacer"></div>
        <div class="label">W</div>
        <div class="label">D</div>
        <div class="label">L</div>
        <div></div>
      `;
      teamsWrap.appendChild(wdlHeader);

      columnData.teams.forEach(([teamName, rank]) => {
        teamsWrap.appendChild(makeTeamRow(teamName, rank, columnData.header, columnState, column));
      });

      const totals = getColumnTotals(columnState);

      const totalsWrap = document.createElement("div");
      totalsWrap.className = "totals";
      totalsWrap.innerHTML = `
        <div class="totals-title">Totals</div>
        <div class="totals-grid">
          <div class="total-box">
            <span class="total-label">Wins</span>
            <span class="total-value" data-total="wins">${totals.wins}</span>
          </div>
          <div class="total-box">
            <span class="total-label">Draws</span>
            <span class="total-value" data-total="draws">${totals.draws}</span>
          </div>
          <div class="total-box">
            <span class="total-label">Losses</span>
            <span class="total-value" data-total="losses">${totals.losses}</span>
          </div>
        </div>
      `;

      column.appendChild(header);
      column.appendChild(teamsWrap);
      column.appendChild(totalsWrap);

      return column;
    }

    columns.forEach(col => grid.appendChild(makeColumn(col)));

    saveAllState(storedState);
  </script>
</body>
</html>
